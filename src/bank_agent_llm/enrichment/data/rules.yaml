# Keyword rules for transaction tagging.
#
# Rules are evaluated top-to-bottom; first match wins.
# Each rule has:
#   tags:      list of tags to assign (most specific first, parent tag last if needed)
#   merchant:  human-readable merchant name
#   patterns:  list of substrings to match against raw_description (case-insensitive)
#   direction: optional — only apply to "debit" or "credit" transactions
#
# Add your own merchants at the bottom or override this file via config/categories.yaml.

rules:

  # ── Credits (payments / abonos) ──────────────────────────────────────────────

  - tags: [pago-tarjeta]
    merchant: "Pago a Tarjeta"
    direction: credit
    patterns:
      - "ABONO WOMPI"
      - "ABONO SUCURSAL"
      - "ABONO DEBITO"
      - "ABONO TRANSFERENCIA"
      - "PAGO TARJETA"
      - "PPAAGGOO TTAARRJJEETTAA"   # Falabella double-encoded
      - "PAGO DE TARJETA"

  - tags: [transferencia]
    merchant: "Transferencia Saliente"
    direction: credit
    patterns:
      - "TRANSF. A"
      - "TRANSFERENCIA"

  - tags: [ingreso]
    merchant: "Devolución / Ingreso"
    direction: credit
    patterns:
      - "DEVOLUCION"
      - "REVERSO"
      - "INGRESO"
      - "REEMBOLSO"
      - "CASHBACK"

  # ── Cargos bancarios (debit — platform fees, taxes) ──────────────────────────

  - tags: [banco, intereses]
    merchant: "Intereses Corrientes"
    patterns:
      - "INTERESES CORRIENTES"

  - tags: [banco, intereses]
    merchant: "Intereses de Mora"
    patterns:
      - "INTERESES MORA"
      - "INTERESES DE MORA"

  - tags: [banco, cuota-manejo]
    merchant: "Cuota de Manejo"
    patterns:
      - "CUOTA DE MANEJO"
      - "CUOTA POR EMISION"
      - "CUOTAS DE MANEJO"
      - "ADMINISTRACION TARJETA"

  - tags: [banco, impuesto-gmf]
    merchant: "Impuesto 4×1000"
    patterns:
      - "GMF GRAVAMEN"
      - "GRAVAMEN MOVIMIENTO FINANC"

  - tags: [banco, seguro-bancario]
    merchant: "Seguro Bancario"
    patterns:
      - "POLIZA CARDIF"
      - "COBRO SEGURO VIDA"
      - "RECAUDO POLIZA"
      - "SEGURO VIDA DEUDOR"
      - "COBRO SEGURO"

  # ── Transporte ────────────────────────────────────────────────────────────────

  - tags: [transporte, uber]
    merchant: "Uber"
    patterns:
      - "UBER RIDES"
      - "UBER EATS"
      - "UBER "

  - tags: [transporte, uber]
    merchant: "Didi"
    patterns:
      - "DLO*DIDI"
      - "DIDI "

  - tags: [transporte, taxi]
    merchant: "InDriver"
    patterns:
      - "INDRIVER"

  - tags: [transporte, parqueadero]
    merchant: "Parqueadero"
    patterns:
      - "PARQUEADERO"
      - "PARKING"
      - "APARCAMIENTO"

  - tags: [transporte, gasolina]
    merchant: "Gasolina / Combustible"
    patterns:
      - "GASOLINERA"
      - "TERPEL"
      - "BIOMAX"
      - "PRIMAX"
      - "PETROBRAS"
      - "EDS "

  # ── Comida — Restaurantes ─────────────────────────────────────────────────────

  - tags: [comida, restaurante]
